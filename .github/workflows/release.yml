name: Release C++ (Linux ZIP)

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libglfw3-dev \
            libgl1-mesa-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            zip

      - name: Compilar projeto
        run: make -C Projeto

      - name: Montar pasta de release
        run: |
          mkdir -p release

          cp Projeto/programa release/

          cp -r Projeto/shaders release/ || true
          cp -r Projeto/assets release/ || true

      - name: Criar ZIP
        run: |
          cd release
          zip -r ../release.zip .

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
