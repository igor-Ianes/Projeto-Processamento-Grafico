name: Build C++ (Linux)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libglfw3-dev \
            libgl1-mesa-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            valgrind \
            xvfb

      - name: Compilar projeto
        run: make -C Projeto
        
      - name: Rodar programa (detectar segfault)
        run: |
          cd Projeto
          timeout 5s xvfb-run -a ./programa || true

      - name: Verificar memory leak
        run: |
          cd Projeto
          set +e

          timeout 5s xvfb-run -a valgrind \
            --leak-check=full \
            --error-exitcode=1 \
            ./programa

          STATUS=$?

          if [ $STATUS -eq 1 ]; then
            echo "Memory leak detectado!"
            exit 1
          elif [ $STATUS -eq 124 ]; then
            echo "Timeout (normal)"
            exit 0
          else
            exit $STATUS
          fi
